<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>体重记录（网页版）</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script defer src="./app.js"></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>体重记录</h1>
      <div class="top-actions">
        <button id="toggleUnitBtn" class="chip">单位：公斤</button>
        <button id="menuBtn" class="chip">导入/导出</button>
      </div>
    </header>

    <section class="filters">
      <button class="chip active" data-range="7">近7天</button>
      <button class="chip" data-range="30">近30天</button>
      <label class="date-label">
        开始
        <input id="startDate" type="date" />
      </label>
      <label class="date-label">
        结束
        <input id="endDate" type="date" />
      </label>
      <button id="applyCustomBtn" class="chip">应用自定义</button>
    </section>

    <section class="card">
      <h2>趋势图</h2>
      <canvas id="weightChart" height="120"></canvas>
    </section>

    <section class="card">
      <h2 id="tableTitle">记录明细（公斤）</h2>
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>体重</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <p id="emptyState" class="empty">该时间段暂无记录</p>
    </section>
  </div>

  <button id="addBtn" class="fab">+ 添加记录</button>

  <dialog id="addDialog">
    <form method="dialog" id="addForm">
      <h3>添加记录</h3>
      <label>
        日期
        <input id="recordDate" type="date" required />
      </label>
      <label class="weight-field">
        <span class="field-head">
          <span class="field-title">体重（<span id="weightUnitLabel">公斤</span>）</span>
          <button id="addUnitToggleBtn" type="button" class="inline-unit-btn">切换到斤</button>
        </span>
        <input id="recordWeight" type="number" step="0.01" min="0.01" required />
      </label>
      <small>精确到小数点后两位，首次默认 120 斤</small>

      <div class="quick-row minus">
        <button type="button" data-delta="-0.5">-0.5</button>
        <button type="button" data-delta="-0.3">-0.3</button>
        <button type="button" data-delta="-0.1">-0.1</button>
      </div>
      <div class="quick-row plus">
        <button type="button" data-delta="0.1">+0.1</button>
        <button type="button" data-delta="0.3">+0.3</button>
        <button type="button" data-delta="0.5">+0.5</button>
      </div>

      <menu>
        <button type="button" onclick="document.getElementById('addDialog').close()">取消</button>
        <button id="saveRecordBtn" type="submit" value="default">保存</button>
      </menu>
    </form>
  </dialog>

  <dialog id="menuDialog">
    <form method="dialog">
      <h3>导入 / 导出</h3>
      <button type="button" id="downloadTemplateBtn">下载导入模板（Excel）</button>
      <button type="button" id="exportBtn">导出当前筛选（Excel）</button>
      <label class="import-label">
        导入 Excel
        <input id="importInput" type="file" accept=".xlsx,.xls" />
      </label>
      <menu>
        <button value="cancel">关闭</button>
      </menu>
    </form>
  </dialog>
</body>
</html>
